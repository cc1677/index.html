<!DOCTYPE html>
<html>
<body style="background:#111;color:white;text-align:center;font-family:sans-serif;">

<h2>Premium Key</h2>

<input id="username" placeholder="Roblox Username">
<br><br>

<button onclick="getKey()">Get Key</button>

<p id="out"></p>

<script>
async function getUserId(username) {
  const res = await fetch("https://users.roblox.com/v1/usernames/users", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ usernames:[username] })
  });

  const data = await res.json();
  return data.data[0]?.id;
}

async function getKey() {
  const username = document.getElementById("username").value;
  if (!username) return;

  const userId = await getUserId(username);
  if (!userId) {
    out.innerText = "Invalid username";
    return;
  }

  const res = await fetch("https://key-premium-8db39-default-rtdb.firebaseio.com/users/" + userId + ".json");
  const data = await res.json();

  if (!data || !data.purchased) {
    out.innerText = "❌ You have not bought premium";
    return;
  }

  out.innerText = "Your Key: " + data.key;
}
</script>

</body>
</html>
